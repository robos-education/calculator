<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Start Your Web Tech-log: Calculator</title>
    <style>
        /* [CSS] 디자인: 인테리어 단계 */
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; padding-top: 50px; }
        .calc-body { background-color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #display { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 15px; border: none; padding: 10px; box-sizing: border-box; border-radius: 5px; background: #222; color: #fff; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { width: 60px; height: 60px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; background: #555; color: white; }
        button:hover { background: #777; }
        .operator { background: #f39c12; } /* 사칙연산 버튼 색상 */
        .clear { background: #e74c3c; }    /* C 버튼 색상 */
        .equal { background: #2ecc71; grid-column: span 2; width: 130px; } /* = 버튼은 길게 */
    </style>
</head>
<body>

    <h1>🧮 나의 첫 계산기</h1>

    <div class="calc-body">
        <input type="text" id="display" value="0" readonly>

        <div class="btn-grid">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="addValue('/')">/</button>
            <button class="operator" onclick="addValue('*')">×</button>
            <button class="operator" onclick="addValue('-')">-</button>

            <button onclick="addValue('7')">7</button>
            <button onclick="addValue('8')">8</button>
            <button onclick="addValue('9')">9</button>
            <button class="operator" onclick="addValue('+')">+</button>

            <button onclick="addValue('4')">4</button>
            <button onclick="addValue('5')">5</button>
            <button onclick="addValue('6')">6</button>
            <button onclick="addValue('0')">0</button>

            <button onclick="addValue('1')">1</button>
            <button onclick="addValue('2')">2</button>
            <button onclick="addValue('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        /* [JS] 기능: 두뇌 단계 */
        const display = document.getElementById('display');

        // 숫지나 기호를 화면에 추가
        function addValue(val) {
            if (display.value === '0') { display.value = val; }
            else { display.value += val; }
        }

        // 화면 초기화 (C 버튼)
        function clearDisplay() {
            display.value = '0';
        }

        // 실제 계산하기 (= 버튼)
        function calculate() {
            try {
                // eval은 문자열로 된 수식을 계산해줍니다 (예: "1+2" -> 3)
                display.value = eval(display.value);
            } catch (e) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
